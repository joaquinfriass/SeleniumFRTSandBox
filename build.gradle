plugins {
    // Apply the application plugin to add support for building a CLI application in Java.
    id 'application'
    id "io.qameta.allure" version "2.11.2"
}

repositories {
    // Use Maven Central for resolving dependencies.
    mavenCentral()
}

dependencies {
    // Use JUnit Jupiter for testing.
    testImplementation libs.junit.jupiter

    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'

    // This dependency is used by the application.
    implementation libs.guava

    // Dependencias de Selenium Source: https://mvnrepository.com/artifact/org.seleniumhq.selenium/selenium-java
    implementation 'org.seleniumhq.selenium:selenium-java:4.41.0'

    // Dependencias de TestNG Source: https://mvnrepository.com/artifact/org.testng/testng
    testImplementation 'org.testng:testng:7.12.0'

    // Dependencias de Cucumber Java Source: https://mvnrepository.com/artifact/io.cucumber/cucumber-java
    implementation 'io.cucumber:cucumber-java:7.34.2'

    // Dependencias de Cucumber JUnit Source: https://mvnrepository.com/artifact/io.cucumber/cucumber-junit
    testImplementation 'io.cucumber:cucumber-junit:7.34.2'
    
    // Dependencia de WebDriver que se autoactualiza Source: https://mvnrepository.com/artifact/io.github.bonigarcia/webdrivermanager
    implementation 'io.github.bonigarcia:webdrivermanager:6.3.3'

// Dependencia de Allure para Cucumber Source: https://mvnrepository.com/artifact/io.qameta.allure/allure-cucumber7-jvm
    testImplementation 'io.qameta.allure:allure-cucumber7-jvm:2.24.0'

    // Dependencia de Allure para JUnit Source: https://mvnrepository.com/artifact/io.qameta.allure/allure-junit4
    testImplementation 'io.qameta.allure:allure-junit4:2.24.0'

}

allure {
    version = "2.24.0"
    autoconfigure = true
}

// Apply a specific Java toolchain to ease working on different environments.
java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

tasks.named('test') {
    // Use JUnit Platform for unit tests.
    systemProperty "cucumber.options", System.getProperty("Cucumber.options")
}
